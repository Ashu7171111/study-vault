<!DOCTYPE html>
<html>
<head>
  <title>Set New Password</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;">

  <div class="auth-box">
    <h2 class="auth-title">New Password</h2>

    <input id="password" type="password" placeholder="New Password" class="auth-input">

    <button class="auth-btn" onclick="changePassword()">Update Password</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

  <script>
    const supabaseClient = supabase.createClient(
      "https://fbhpobafnvmbkoslehdg.supabase.co",
      "YOUR_ANON_KEY"
    );

    async function changePassword() {
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.updateUser({
        password
      });

      if (error) return alert("Error: " + error.message);

      alert("Password updated! Now login.");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
